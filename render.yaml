# Render Blueprint: single free Docker web service (FastAPI + built Vite SPA).
# Secrets (sync: false) are set in the Render dashboard, not committed.
services:
  - type: web
    name: visa-drill
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: AVATAR_API_KEY
        sync: false
      # Interview length in seconds (set in the dashboard; lower to conserve
      # free-tier minutes). Falls back to the code default (240) if unset.
      - key: INTERVIEW_DURATION_SECONDS
        sync: false
      # Optional: pin a stock replica / language.
      - key: AVATAR_REPLICA_ID
        sync: false
      # Pre-provisioned persona ids (run scripts/provision.py once, then paste here).
      # When all three are set, cold starts skip provisioning and never duplicate resources.
      - key: PERSONA_B1B2_ID
        sync: false
      - key: PERSONA_F1_ID
        sync: false
      - key: PERSONA_H1B_ID
        sync: false
      - key: PERSONA_J1_ID
        sync: false
      - key: PERSONA_N400_ID
        sync: false
      # Waitlist (optional). With these the backend saves /api/waitlist signups to
      # a Supabase table; without them they fall back to a local file. Use the
      # service_role key (server-side only). See the README "Waitlist" section.
      - key: DB_URL
        sync: false
      - key: DB_SERVICE_KEY
        sync: false
      # Enables the admin signup-list endpoint (GET /api/waitlist).
      - key: ADMIN_TOKEN
        sync: false
    # RENDER_EXTERNAL_URL is injected automatically and used as the webhook base.
